spring:
  datasource:
    url: jdbc:h2:mem:deliverytest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: true

  sql:
    init:
      mode: never

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

kakao:
  api:
    key: test-kakao-key