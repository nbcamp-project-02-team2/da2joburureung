version: "3.8"
services:
  eureka-server:
    build:
      context: ./eureka-server
    container_name: eureka-server
    ports:
      - "${EUREKA_SERVER_PORT}:8761"
    environment:
      SERVER_PORT: 8761
  user-db:
    image: postgres:16
    container_name: user-db
    environment:
      POSTGRES_DB: ${USER_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${USER_DB_PORT}:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
  user-service:
    build:
      context: ./user-service
    container_name: user-service
    depends_on:
      - eureka-server
      - user-db
    ports:
      - "${USER_SERVER_PORT}:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/${USER_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
  gateway-service:
    build:
      context: ./gateway-service
    container_name: gateway-service
    depends_on:
      - eureka-server
      - user-service
    ports:
      - "${GATEWAY_SERVER_PORT}:8080"
    environment:
      SERVER_PORT: 8080
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET}
  product-db:
    image: postgres:15
    container_name: product-db
    environment:
      POSTGRES_DB: ${PRODUCT_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${PRODUCT_DB_PORT}:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data

  product-service:
    build:
      context: ./product-service
    container_name: product-service
    depends_on:
      - eureka-server
      - product-db
      - redis
    expose:
      - "8090"
    environment:
      SERVER_PORT: 8090
      SPRING_DATASOURCE_URL: jdbc:postgresql://product-db:5432/${PRODUCT_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "${SPRING_DATA_REDIS_PORT}:6379"
  company-db:
    image: postgres:15
    container_name: company-db
    environment:
      POSTGRES_DB: company
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${COMPANY_DB_PORT}:5432"
    volumes:
      - company-db-data:/var/lib/postgresql/data
  company-service:
    build:
      context: ./company-service
    container_name: company-service
    depends_on:
      - eureka-server
      - company-db
      - redis
      - kafka
    expose:
      - "8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      KAKAO_API_KEY: ${KAKAO_API_KEY}
  hub-db:
    image: postgres:15
    container_name: hub-db
    environment:
      POSTGRES_DB: hub
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${HUB_DB_PORT}:5432"
    volumes:
      - hub-db-data:/var/lib/postgresql/data
  hub-service:
    build:
      context: ./hub-service
    container_name: hub-service
    depends_on:
      - eureka-server
      - hub-db
    ports:
      - "${HUB_SERVER_PORT}:8084"
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://hub-db:5432/hub
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      KAKAO_API_KEY: ${KAKAO_API_KEY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_HOST: redis
  hubpath-service:
    build:
      context: ./hubpath-service
    container_name: hubpath-service
    depends_on:
      - eureka-server
      - hub-db
    ports:
      - "${HUB_PATH_SERVER_PORT}:8086"
    environment:
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: jdbc:postgresql://hub-db:5432/hub
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      KAKAO_API_KEY: ${KAKAO_API_KEY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_HOST: redis
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
    ports:
      - "${ZOOKEEPER_CLIENT_PORT}:2181"
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_EXTERNAL_PORT}:29092"
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:${KAFKA_INTERNAL_PORT},PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:${KAFKA_INTERNAL_PORT},PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT}
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
volumes:
  user-db-data:
  product-db-data:
  company-db-data:
  hub-db-data: